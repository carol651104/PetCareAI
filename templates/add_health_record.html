<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>新增健康紀錄 - PetCareAI</title>

    <style>
        body {
            margin: 0;
            font-family: "Microsoft JhengHei", sans-serif;
            background: #faf7f4;
            color: #222;
        }

        .container {
            max-width: 760px;
            margin: 60px auto;
            background: white;
            padding: 42px;
            border-radius: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
        }

        h1 {
            color: #b87333;
            margin-bottom: 12px;
        }

        p {
            color: #555;
            line-height: 1.8;
        }

        label {
            display: block;
            margin-top: 18px;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 13px;
            margin-top: 8px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
        }

        textarea {
            min-height: 110px;
            resize: vertical;
        }

        .actions {
            margin-top: 26px;
        }

        button, a {
            display: inline-block;
            padding: 12px 22px;
            background: #8eb4f7;
            color: white;
            border: none;
            border-radius: 999px;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
            margin-right: 8px;
        }

        .btn-brown {
            background: #b87333;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>新增健康紀錄</h1>
    <p>為 {{ pet.name }} 新增一筆健康狀況紀錄。</p>

    <form method="POST">
        <label>紀錄日期</label>
        <input type="date" name="record_date">

        <label>體重 kg</label>
        <input type="number" step="0.1" name="weight" placeholder="例如：4.5">

        <label>食慾</label>
        <select name="appetite">
            <option value="">請選擇</option>
            <option value="正常">正常</option>
            <option value="變好">變好</option>
            <option value="變差">變差</option>
            <option value="幾乎不吃">幾乎不吃</option>
            <option value="食慾過旺">食慾過旺</option>
        </select>

        <label>活動量</label>
        <select name="activity">
            <option value="">請選擇</option>
            <option value="正常">正常</option>
            <option value="活躍">活躍</option>
            <option value="偏低">偏低</option>
            <option value="幾乎不動">幾乎不動</option>
            <option value="異常躁動">異常躁動</option>
        </select>

        <label>症狀</label>
        <textarea name="symptoms" placeholder="例如：嘔吐、拉肚子、咳嗽、精神不好、打噴嚏等"></textarea>

        <label>用藥情況</label>
        <textarea name="medication" placeholder="例如：早晚各一次、藥名、用藥後反應等"></textarea>

        <label>備註</label>
        <textarea name="note" placeholder="其他補充說明"></textarea>

        <div class="actions">
            <button type="submit">儲存健康紀錄</button>
            <a class="btn-brown" href="/pets/{{ pet.id }}">返回寵物詳細資料</a>
        </div>
    </form>
</div>

</body>
</html>
