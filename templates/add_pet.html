<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>新增寵物 - PetCareAI</title>

    <style>
        body {
            margin: 0;
            font-family: "Microsoft JhengHei", sans-serif;
            background: #faf7f4;
            color: #222;
        }

        .container {
            max-width: 720px;
            margin: 60px auto;
            background: white;
            padding: 42px;
            border-radius: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
        }

        h1 {
            color: #b87333;
            margin-bottom: 12px;
        }

        p {
            color: #555;
            line-height: 1.8;
        }

        label {
            display: block;
            margin-top: 18px;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 13px;
            margin-top: 8px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
        }

        textarea {
            min-height: 110px;
            resize: vertical;
        }

        .hint {
            font-size: 14px;
            color: #777;
            margin-top: 6px;
            line-height: 1.6;
        }

        .actions {
            margin-top: 26px;
        }

        button, a {
            display: inline-block;
            padding: 12px 22px;
            background: #8eb4f7;
            color: white;
            border: none;
            border-radius: 999px;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
            margin-right: 8px;
        }

        .btn-brown {
            background: #b87333;
        }

        .flash {
            background: #fff6e8;
            color: #8a4f1d;
            padding: 12px 16px;
            border-radius: 14px;
            margin-bottom: 18px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>新增寵物資料</h1>
    <p>請輸入寵物基本資料，之後可用來建立健康紀錄、就醫紀錄與提醒事項。</p>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div class="flash">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST" enctype="multipart/form-data">
        <label>寵物名稱 *</label>
        <input type="text" name="name" placeholder="例如：布丁" required>

        <label>物種 *</label>
        <select name="species" required>
            <option value="">請選擇</option>
            <option value="貓">貓</option>
            <option value="狗">狗</option>
            <option value="兔子">兔子</option>
            <option value="倉鼠">倉鼠</option>
            <option value="天竺鼠">天竺鼠</option>
            <option value="鳥類">鳥類</option>
            <option value="鸚鵡">鸚鵡</option>
            <option value="烏龜">烏龜</option>
            <option value="魚類">魚類</option>
            <option value="蜥蜴">蜥蜴</option>
            <option value="蛇">蛇</option>
            <option value="刺蝟">刺蝟</option>
            <option value="蜜袋鼯">蜜袋鼯</option>
            <option value="雪貂">雪貂</option>
            <option value="其他">其他</option>
        </select>

        <label>品種</label>
        <input type="text" name="breed" placeholder="例如：米克斯、柴犬、英短、虎皮鸚鵡">

        <label>性別</label>
        <select name="gender">
            <option value="">請選擇</option>
            <option value="母">母</option>
            <option value="公">公</option>
            <option value="未知">未知</option>
        </select>

        <label>年齡</label>
        <input type="text" name="age" placeholder="例如：3 歲、6 個月">

        <label>體重 kg</label>
        <input type="number" step="0.1" name="weight" placeholder="例如：4.5">

        <label>上傳照片</label>
        <input type="file" name="photo_file" accept="image/png, image/jpeg, image/jpg, image/gif, image/webp">
        <div class="hint">支援 png、jpg、jpeg、gif、webp。可以先不傳。</div>

        <label>備註</label>
        <textarea name="note" placeholder="例如：容易緊張、對某些食物過敏、定期服藥等"></textarea>

        <div class="actions">
            <button type="submit">儲存寵物</button>
            <a class="btn-brown" href="/pets">返回列表</a>
        </div>
    </form>
</div>

</body>
</html>
