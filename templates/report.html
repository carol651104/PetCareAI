<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>健康報告匯出</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background: #faf7f4;
            padding: 50px;
            color: #222;
        }

        .box {
            max-width: 850px;
            margin: auto;
            background: white;
            padding: 42px;
            border-radius: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,.06);
        }

        h1 {
            color: #b87333;
        }

        p {
            line-height: 1.8;
            font-size: 17px;
        }

        .report {
            border: 2px solid #d8e4ff;
            border-radius: 20px;
            padding: 28px;
            margin-top: 24px;
            line-height: 1.9;
            background: #fbfdff;
        }

        button, a {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 22px;
            background: #8eb4f7;
            color: white;
            border: none;
            border-radius: 999px;
            text-decoration: none;
            cursor: pointer;
            font-size: 15px;
        }

        @media print {
            body {
                background: white;
            }

            a, button {
                display: none;
            }

            .box {
                box-shadow: none;
            }
        }
    </style>
</head>
<body>
<div class="box">
    <h1>健康報告匯出</h1>

    <p>
        將寵物基本資料、健康紀錄、疫苗紀錄與就醫紀錄整理成報告，方便飼主回診或提供給獸醫參考。
    </p>

    <div class="report">
        <h2>PetCareAI 健康報告</h2>
        寵物名稱：布丁<br>
        物種：貓<br>
        年齡：3 歲<br>
        體重：4.5 kg<br>
        最近健康狀態：食慾正常、活動量正常<br>
        最近疫苗日期：2026/07/01<br>
        最近就醫紀錄：腸胃不適，已服藥觀察<br>
        AI 初步建議：目前可持續觀察，若症狀加重應安排就醫。
    </div>

    <button onclick="window.print()">列印 / 匯出展示</button>
    <a href="/features">返回功能列表</a>
</div>
</body>
</html>
