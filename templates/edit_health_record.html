<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>修改健康紀錄 - PetCareAI</title>

    <style>
        body {
            margin: 0;
            font-family: "Microsoft JhengHei", sans-serif;
            background: #faf7f4;
            color: #222;
        }

        .container {
            max-width: 760px;
            margin: 60px auto;
            background: white;
            padding: 42px;
            border-radius: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
        }

        h1 {
            color: #b87333;
            margin-bottom: 12px;
        }

        p {
            color: #555;
            line-height: 1.8;
        }

        label {
            display: block;
            margin-top: 18px;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 13px;
            margin-top: 8px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
        }

        textarea {
            min-height: 110px;
            resize: vertical;
        }

        .actions {
            margin-top: 26px;
        }

        button, a {
            display: inline-block;
            padding: 12px 22px;
            background: #8eb4f7;
            color: white;
            border: none;
            border-radius: 999px;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
            margin-right: 8px;
        }

        .btn-brown {
            background: #b87333;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>修改健康紀錄</h1>
    <p>更新 {{ pet.name }} 的健康紀錄。</p>

    <form method="POST">
        <label>紀錄日期</label>
        <input type="date" name="record_date" value="{{ record.record_date }}">

        <label>體重 kg</label>
        <input type="number" step="0.1" name="weight" value="{{ record.weight or '' }}">

        <label>食慾</label>
        <select name="appetite">
            <option value="">請選擇</option>
            <option value="正常" {% if record.appetite == "正常" %}selected{% endif %}>正常</option>
            <option value="變好" {% if record.appetite == "變好" %}selected{% endif %}>變好</option>
            <option value="變差" {% if record.appetite == "變差" %}selected{% endif %}>變差</option>
            <option value="幾乎不吃" {% if record.appetite == "幾乎不吃" %}selected{% endif %}>幾乎不吃</option>
            <option value="食慾過旺" {% if record.appetite == "食慾過旺" %}selected{% endif %}>食慾過旺</option>
        </select>

        <label>活動量</label>
        <select name="activity">
            <option value="">請選擇</option>
            <option value="正常" {% if record.activity == "正常" %}selected{% endif %}>正常</option>
            <option value="活躍" {% if record.activity == "活躍" %}selected{% endif %}>活躍</option>
            <option value="偏低" {% if record.activity == "偏低" %}selected{% endif %}>偏低</option>
            <option value="幾乎不動" {% if record.activity == "幾乎不動" %}selected{% endif %}>幾乎不動</option>
            <option value="異常躁動" {% if record.activity == "異常躁動" %}selected{% endif %}>異常躁動</option>
        </select>

        <label>症狀</label>
        <textarea name="symptoms">{{ record.symptoms or '' }}</textarea>

        <label>用藥情況</label>
        <textarea name="medication">{{ record.medication or '' }}</textarea>

        <label>備註</label>
        <textarea name="note">{{ record.note or '' }}</textarea>

        <div class="actions">
            <button type="submit">儲存修改</button>
            <a class="btn-brown" href="/pets/{{ pet.id }}">返回寵物詳細資料</a>
        </div>
    </form>
</div>

</body>
</html>
