{% extends "base.html" %}

{% block title %}登入 PetCareAI{% endblock %}

{% block content %}
<div class="card" style="max-width: 560px; margin: 40px auto;">
    <h1>登入 PetCareAI</h1>
    <p class="muted">登入後即可進入個人 Dashboard，管理寵物健康資料。</p>

    <form method="POST">
        <label>Email</label>
        <input type="email" name="email" required>

        <label>密碼</label>
        <input type="password" name="password" required>

        <button class="btn btn-brown" type="submit">登入</button>
        <a class="btn" href="/register">前往註冊</a>
    </form>
</div>
{% endblock %}
