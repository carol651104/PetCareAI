{% extends "base.html" %}

{% block title %}健康紀錄{% endblock %}

{% block content %}

<div class="card" style="max-width:760px; margin:0 auto;">
    <h1>{% if mode == "add" %}新增健康紀錄{% else %}修改健康紀錄{% endif %}</h1>
    <p class="muted">寵物：{{ pet.name }}</p>

    <form method="POST">
        <label>紀錄日期</label>
        <input type="date" name="record_date" value="{{ record.record_date if record else '' }}">

        <label>體重 kg</label>
        <input type="number" step="0.1" name="weight" value="{{ record.weight if record and record.weight else '' }}">

        <label>食慾</label>
        <select name="appetite">
            {% set options = ["正常", "變好", "變差", "幾乎不吃", "食慾過旺"] %}
            <option value="">請選擇</option>
            {% for item in options %}
                <option value="{{ item }}" {% if record and record.appetite == item %}selected{% endif %}>{{ item }}</option>
            {% endfor %}
        </select>

        <label>活動量</label>
        <select name="activity">
            {% set options = ["正常", "活躍", "偏低", "幾乎不動", "異常躁動"] %}
            <option value="">請選擇</option>
            {% for item in options %}
                <option value="{{ item }}" {% if record and record.activity == item %}selected{% endif %}>{{ item }}</option>
            {% endfor %}
        </select>

        <label>症狀</label>
        <textarea name="symptoms">{{ record.symptoms if record else '' }}</textarea>

        <label>用藥情況</label>
        <textarea name="medication">{{ record.medication if record else '' }}</textarea>

        <label>備註</label>
        <textarea name="note">{{ record.note if record else '' }}</textarea>

        <button class="btn btn-brown" type="submit">儲存</button>
        <a class="btn" href="/pets/{{ pet.id }}">返回寵物詳細資料</a>
    </form>
</div>

{% endblock %}
