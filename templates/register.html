{% extends "base.html" %}

{% block title %}註冊 PetCareAI{% endblock %}

{% block content %}
<div class="card" style="max-width: 560px; margin: 40px auto;">
    <h1>註冊 PetCareAI</h1>
    <p class="muted">建立帳號後，即可開始管理你的寵物健康資料。</p>

    <form method="POST">
        <label>使用者名稱</label>
        <input type="text" name="username" required>

        <label>Email</label>
        <input type="email" name="email" required>

        <label>密碼</label>
        <input type="password" name="password" required>

        <button class="btn btn-brown" type="submit">註冊</button>
        <a class="btn" href="/login">已有帳號，前往登入</a>
    </form>
</div>
{% endblock %}
