<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}PetCareAI{% endblock %}</title>

    <style>
        body {
            margin: 0;
            font-family: "Microsoft JhengHei", sans-serif;
            background: #faf7f4;
            color: #222;
        }

        .page {
            max-width: 1120px;
            margin: auto;
            padding: 42px 24px;
        }

        .nav {
            max-width: 1120px;
            margin: auto;
            padding: 20px 24px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            color: #b87333;
            font-weight: bold;
            font-size: 22px;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 14px;
        }

        .nav-links a {
            color: #b87333;
            font-weight: bold;
            text-decoration: none;
            font-size: 14px;
        }

        h1, h2, h3 {
            color: #b87333;
        }

        h1 {
            margin-top: 0;
        }

        p {
            line-height: 1.8;
        }

        .muted {
            color: #666;
            line-height: 1.8;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 18px;
            min-height: 40px;
            background: #8eb4f7;
            color: white;
            border-radius: 999px;
            text-decoration: none;
            font-weight: bold;
            border: none;
            cursor: pointer;
            margin: 0;
            font-size: 14px;
            font-family: "Microsoft JhengHei", sans-serif;
            box-sizing: border-box;
            white-space: nowrap;
            line-height: 1;
        }

        .btn:hover {
            background: #75a1ef;
            color: white;
        }

        .btn:visited {
            color: white;
        }

        .btn-brown {
            background: #b87333;
        }

        .btn-brown:hover {
            background: #9f622c;
        }

        .btn-danger {
            background: #e06b6b;
        }

        .btn-danger:hover {
            background: #d95858;
        }

        .btn-green {
            background: #70b77e;
        }

        .btn-green:hover {
            background: #5fa36d;
        }

        .card {
            background: white;
            padding: 28px;
            border-radius: 22px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
            margin-bottom: 22px;
            box-sizing: border-box;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 22px;
            margin-top: 22px;
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 22px;
            margin-top: 22px;
        }

        .grid-4 > .card {
            min-height: 230px;
            display: flex;
            flex-direction: column;
        }

        .grid-4 > .card .btn {
            margin-top: auto;
        }

        .feature-icon {
            font-size: 42px;
            margin-bottom: 16px;
            line-height: 1;
        }

        .record {
            background: #f6f8ff;
            padding: 18px;
            border-radius: 16px;
            margin-top: 14px;
            line-height: 1.9;
            box-sizing: border-box;
        }

        .badge {
            display: inline-block;
            padding: 7px 12px;
            border-radius: 999px;
            color: white;
            font-size: 13px;
            font-weight: bold;
        }

        .done {
            background: #70b77e;
        }

        .pending {
            background: #e6a14f;
        }

        label {
            display: block;
            margin-top: 16px;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 13px;
            margin-top: 8px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            font-family: "Microsoft JhengHei", sans-serif;
            background: white;
        }

        textarea {
            min-height: 110px;
            resize: vertical;
        }

        .flash {
            background: #fff6e8;
            color: #8a4f1d;
            padding: 12px 16px;
            border-radius: 14px;
            margin-bottom: 18px;
        }

        /*
            共用按鈕排列：
            用在寵物卡片、健康紀錄、就醫紀錄、提醒事項、登入註冊按鈕。
        */
        .card-actions,
        .record-actions {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 18px;
        }

        .card-actions form,
        .record-actions form {
            margin: 0;
            display: inline-flex;
        }

        /*
            寵物列表卡片：
            讓查看 / 修改 / 刪除固定在卡片底部。
        */
        .pet-card {
            display: flex;
            flex-direction: column;
            min-height: 470px;
        }

        .pet-card .card-actions {
            margin-top: auto;
        }

        /*
            Dashboard 統計卡片：
            讓 4 個數字與按鈕上下位置一致。
        */
        .stat-card {
            min-height: 250px;
            display: flex;
            flex-direction: column;
        }

        .stat-bottom {
            margin-top: auto;
        }

        .stat-number {
            font-size: 36px;
            font-weight: bold;
            color: #b87333;
            line-height: 1;
            margin-bottom: 10px;
        }

        .stat-meta {
            color: #777;
            font-size: 14px;
            margin-bottom: 18px;
            min-height: 20px;
            line-height: 1.5;
        }

        .stat-card .btn {
            width: fit-content;
        }

        /*
            表單頁面常用容器。
        */
        .form-card {
            max-width: 760px;
            margin: 40px auto;
        }

        @media (max-width: 1000px) {
            .grid-4 {
                grid-template-columns: repeat(2, 1fr);
            }

            .grid-3 {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 700px) {
            .page {
                padding: 30px 18px;
            }

            .nav {
                display: block;
                padding: 18px 18px 0;
            }

            .nav-links {
                margin-top: 12px;
                gap: 10px;
            }

            .grid-3,
            .grid-4 {
                grid-template-columns: 1fr;
            }

            .card {
                padding: 22px;
            }

            .card-actions,
            .record-actions {
                align-items: flex-start;
            }

            .btn {
                font-size: 13px;
                padding: 10px 16px;
            }

            .pet-card {
                min-height: auto;
            }

            .stat-card {
                min-height: auto;
            }
        }

        @media print {
            .nav,
            .btn,
            .card-actions,
            .record-actions {
                display: none !important;
            }

            body {
                background: white;
            }

            .page {
                max-width: 100%;
                padding: 0;
            }

            .card {
                box-shadow: none;
                border: 1px solid #ddd;
                page-break-inside: avoid;
            }
        }
    </style>
</head>

<body>

<div class="nav">
    <a class="brand" href="/">PetCareAI</a>

    <div class="nav-links">
        <a href="/features">功能</a>

        {% if current_user.is_authenticated %}
            <a href="/dashboard">Dashboard</a>
            <a href="/pets">寵物</a>
            <a href="/health-records">健康紀錄</a>
            <a href="/medical-records">就醫紀錄</a>
            <a href="/reminders">提醒</a>
            <a href="/report">報告</a>
            <a href="/logout">登出</a>
        {% else %}
            <a href="/login">登入</a>
            <a href="/register">註冊</a>
        {% endif %}
    </div>
</div>

<div class="page">
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div class="flash">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</div>

</body>
</html>
