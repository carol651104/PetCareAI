{% extends "base.html" %}

{% block title %}
    {% if mode == "add" %}新增寵物{% else %}修改寵物{% endif %}
{% endblock %}

{% block content %}

<div class="card" style="max-width: 760px; margin: 0 auto;">
    <h1>{% if mode == "add" %}新增寵物{% else %}修改寵物{% endif %}</h1>

    <form method="POST" enctype="multipart/form-data">
        <label>寵物名稱 *</label>
        <input type="text" name="name" value="{{ pet.name if pet else '' }}" required>

        <label>物種 *</label>
        <select name="species" required>
            {% set species_list = ["貓", "狗", "兔子", "倉鼠", "天竺鼠", "鳥類", "鸚鵡", "烏龜", "魚類", "蜥蜴", "蛇", "刺蝟", "蜜袋鼯", "雪貂", "其他"] %}
            {% for item in species_list %}
                <option value="{{ item }}" {% if pet and pet.species == item %}selected{% endif %}>{{ item }}</option>
            {% endfor %}
        </select>

        <label>品種</label>
        <input type="text" name="breed" value="{{ pet.breed if pet else '' }}">

        <label>性別</label>
        <select name="gender">
            {% set gender_list = ["母", "公", "未知"] %}
            {% for item in gender_list %}
                <option value="{{ item }}" {% if pet and pet.gender == item %}selected{% endif %}>{{ item }}</option>
            {% endfor %}
        </select>

        <label>年齡</label>
        <input type="text" name="age" value="{{ pet.age if pet else '' }}" placeholder="例如：3 歲、6 個月">

        <label>體重 kg</label>
        <input type="number" step="0.1" name="weight" value="{{ pet.weight if pet and pet.weight else '' }}">

        <label>{% if mode == "add" %}上傳照片{% else %}更換照片{% endif %}</label>
        <input type="file" name="photo_file" accept="image/png, image/jpeg, image/jpg, image/gif, image/webp">

        {% if pet and pet.photo_url %}
            <div class="record">
                目前照片：<br>
                <img src="{{ pet.photo_url }}" style="max-width:220px; border-radius:14px;">
            </div>
        {% endif %}

        <label>備註</label>
        <textarea name="note">{{ pet.note if pet else '' }}</textarea>

        <button class="btn btn-brown" type="submit">儲存</button>
        <a class="btn" href="/pets">返回列表</a>
    </form>
</div>

{% endblock %}
