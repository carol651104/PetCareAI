<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - PetCareAI</title>

    <style>
        body {
            margin: 0;
            font-family: "Microsoft JhengHei", sans-serif;
            background: #faf7f4;
            color: #222;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 50px 24px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 34px;
        }

        h1 {
            color: #b87333;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #555;
            line-height: 1.8;
        }

        .btn {
            display: inline-block;
            padding: 11px 20px;
            background: #8eb4f7;
            color: white;
            border-radius: 999px;
            text-decoration: none;
            font-weight: bold;
            margin-right: 8px;
        }

        .btn-brown {
            background: #b87333;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 22px;
            margin-top: 28px;
        }

        .card {
            background: white;
            padding: 28px;
            border-radius: 22px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
            min-height: 170px;
        }

        .card h3 {
            color: #b87333;
            margin-bottom: 12px;
        }

        .number {
            font-size: 36px;
            font-weight: bold;
            color: #8eb4f7;
            margin-top: 12px;
        }

        .section {
            background: white;
            padding: 28px;
            border-radius: 22px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
            margin-top: 28px;
        }

        @media (max-width: 800px) {
            .topbar {
                display: block;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .btn {
                margin-top: 10px;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <div class="topbar">
        <div>
            <h1>PetCareAI Dashboard</h1>
            <div class="subtitle">
                歡迎，{{ current_user.username }}。這裡是你的寵物健康管理中心。
            </div>
        </div>

        <div>
            <a class="btn" href="/">AI 症狀分析</a>
            <a class="btn btn-brown" href="/logout">登出</a>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <h3>寵物資料</h3>
            <p>管理你的寵物基本資料。</p>
            <div class="number">0</div>
        </div>

        <div class="card">
            <h3>健康紀錄</h3>
            <p>追蹤體重、食慾、活動量與症狀。</p>
            <div class="number">0</div>
        </div>

        <div class="card">
            <h3>提醒事項</h3>
            <p>管理疫苗、驅蟲、健檢與回診提醒。</p>
            <div class="number">0</div>
        </div>
    </div>

    <div class="section">
        <h3>目前系統進度</h3>
        <p>
            你現在已完成登入系統與資料庫骨架。下一階段會加入寵物資料管理功能，
            讓使用者可以新增、查看與管理自己的寵物資料。
        </p>

        <a class="btn" href="/features">查看 8 大功能</a>
    </div>
</div>

</body>
</html>
